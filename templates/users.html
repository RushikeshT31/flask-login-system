<!DOCTYPE html>

<html>

<head>

    <title>All Users</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="container">

    <h2>👥 Registered Users</h2>

    <table border="1"
           cellpadding="10"
           style="width:100%;
           background:white;
           color:black;
           border-radius:10px;">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Email</th>

        </tr>

        {% for user in users %}

        <tr>

            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>

        </tr>

        {% endfor %}

    </table>

    <a href="/"
       class="back-btn">

       Back to Login

    </a>

</div>

</body>

</html>
