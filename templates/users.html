<!DOCTYPE html>
<html>

<head>

    <title>Users Data</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            padding: 30px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td{
            border: 1px solid black;
            padding: 12px;
            text-align: center;
        }

        th{
            background: #333;
            color: white;
        }

        h1{
            text-align: center;
        }

    </style>

</head>

<body>

    <h1>Registered Users</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
        </tr>

        {% for user in users %}

        <tr>
            <td>{{ user['id'] }}</td>
            <td>{{ user['name'] }}</td>
            <td>{{ user['email'] }}</td>
            <td>{{ user['password'] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>

</html>
